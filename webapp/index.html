<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MLB WAR by Direct Regression</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>MLB WAR by Direct Regression</h1>
  <p class="sub">
    Ridge-regressed runs-above-average per half-inning &mdash;
    not derived from box-score components.
    <a href="https://github.com/VBaratham/mlb-war-regression">source &amp; methodology</a>
  </p>
</header>

<nav id="view-bar">
  <label>View:
    <select id="view"></select>
  </label>
  <span id="generated"></span>
</nav>

<section id="controls">
  <input id="search" type="search" placeholder="filter by name...">
  <label>Position
    <select id="pos">
      <option value="">All</option>
      <option>P</option><option>C</option>
      <option>1B</option><option>2B</option>
      <option>3B</option><option>SS</option>
      <option>OF</option><option>DH</option>
    </select>
  </label>
  <label>Min total innings
    <input id="min-inn" type="number" value="500" min="0" step="100">
  </label>
  <label>Sort by
    <select id="sort">
      <option value="total_war">Total WAR</option>
      <option value="off_war">Offensive WAR</option>
      <option value="pit_war">Pitching WAR</option>
      <option value="fld_war">Fielding WAR</option>
      <option value="total_war_per_season">Total WAR / season</option>
      <option value="off_war_full_season_rate">Offensive peak rate</option>
      <option value="pit_war_full_season_rate">Pitching peak rate</option>
    </select>
  </label>
</section>

<section id="chart-section" hidden>
  <h2>WAR over time</h2>
  <label class="inline">Top
    <input id="topn" type="number" value="10" min="1" max="50" step="1">
    players (by current total WAR, click legend to toggle)
  </label>
  <div id="chart"></div>
  <p id="chart-note" class="note"></p>
</section>

<section id="table-section">
  <h2 id="table-title">Leaderboard</h2>
  <div class="table-wrap">
    <table id="leaderboard">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Pos</th>
          <th>Team</th>
          <th class="num">Total WAR</th>
          <th class="num">Off</th>
          <th class="num">Pit</th>
          <th class="num">Fld</th>
          <th class="num">Innings</th>
          <th class="num">First yr</th>
          <th class="num">Last yr</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</section>

<footer>
  <p>Data refreshed daily by a cronjob in the source repo.</p>
</footer>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js" defer></script>
<script src="app.js" defer></script>
</body>
</html>
